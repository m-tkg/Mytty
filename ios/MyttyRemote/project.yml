name: MyttyRemote
options:
  deploymentTarget:
    iOS: "17.0"
# Signing (DEVELOPMENT_TEAM / PRODUCT_BUNDLE_IDENTIFIER) lives in
# Config/Signing.xcconfig so each developer can override it via the untracked
# Config/Local.xcconfig. Do not add those keys back to `settings:` — values
# expanded into the pbxproj take precedence over xcconfig and would break the
# override (same reason options.bundleIdPrefix must stay absent).
configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig
packages:
  MyTTYRemoteKit:
    path: ../..
targets:
  MyttyRemote:
    type: application
    platform: iOS
    sources:
      - path: MyttyRemote
    # `development` is what a locally signed build gets; Xcode substitutes
    # `production` when archiving with a distribution profile, which is
    # why the app reads the environment back out of the embedded profile
    # instead of trusting a compile-time flag.
    entitlements:
      path: MyttyRemote/MyttyRemote.entitlements
      properties:
        aps-environment: development
        # Shared with the notification service extension so it can read
        # the pairing secrets and decrypt Attention pushes.
        keychain-access-groups:
          - $(AppIdentifierPrefix)dev.mytty.remote.shared
    info:
      path: MyttyRemote/Info.plist
      properties:
        UILaunchScreen: {}
        # Xcode expands $(AppIdentifierPrefix) here at build time, so
        # neither target has to hardcode the team ID to find the group.
        MyTTYKeychainAccessGroup: $(AppIdentifierPrefix)dev.mytty.remote.shared
        NSLocalNetworkUsageDescription: "Mytty needs local network access to find and connect to your Mac."
        NSBonjourServices:
          - _mytty._tcp
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # The remote channel only uses OS-provided standard cryptography
        # (CryptoKit HKDF-SHA256 + AES-256-GCM), which is exempt — answer
        # the export-compliance question up front so App Store Connect
        # stops flagging every build as "Missing Compliance".
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad multitasking requires supporting all four orientations
        # (App Store validation warns otherwise).
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: MyTTYRemoteKit
        product: MyTTYRemoteKit
      - target: NotificationService

  # Decrypts Attention pushes before iOS shows them. The relay only ever
  # carries ciphertext, so without this the phone shows a placeholder.
  NotificationService:
    type: app-extension
    platform: iOS
    sources:
      - path: NotificationService
      # Shared verbatim with the app: the extension needs the same
      # Keychain records to find a Mac's pairing secret.
      - path: MyttyRemote/PairedMacStore.swift
    entitlements:
      path: NotificationService/NotificationService.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)dev.mytty.remote.shared
    info:
      path: NotificationService/Info.plist
      properties:
        # App Store validation rejects an extension without one
        # (ITMS-90360), even though nothing surfaces it prominently.
        CFBundleDisplayName: Mytty Notification Service
        MyTTYKeychainAccessGroup: $(AppIdentifierPrefix)dev.mytty.remote.shared
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        # Derived from the app's id so overriding MYTTY_BUNDLE_ID in
        # Config/Local.xcconfig moves both targets together.
        PRODUCT_BUNDLE_IDENTIFIER: $(MYTTY_BUNDLE_ID).NotificationService
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        SKIP_INSTALL: true
    dependencies:
      - package: MyTTYRemoteKit
        product: MyTTYRemoteKit
# Xcode Cloud can only create workflows for a scheme that is shared and
# checked into the repository, so define it here instead of relying on
# Xcode's auto-generated per-user scheme.
schemes:
  MyttyRemote:
    build:
      targets:
        MyttyRemote: all
    run:
      config: Debug
    archive:
      config: Release
